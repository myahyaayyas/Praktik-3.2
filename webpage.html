<body style="background-color: rgb(184, 184, 184);">
    <table style="border: 1px solid black;">
        <thead>

        </thead>
        <tbody>
            <tr>
                <td style="padding-right: 20px;"></td>
                <td>Home</td>
                <td style="padding-right: 80px;">|</td>
                <td>Generate</td>

                <td>Transaction History</td>
                <td style="padding-right: 80px;">|</td>

                <td style="padding-right: 80px;">|</td>
                <td style="padding-right: 80px;">Logout</td>
            </tr>
        </tbody>
    </table>
    <br>
    <table>
        <tbody>
            <tr>
                <td style="border: 1px solid black; width: 150px; height: 50px;"></td>
                <td colspan="2" style="text-align: left;">
                    <label style="padding-right: 30px;" for="input-name">Title Here :</label>
                    <input id="input-name" type="text">
                    <br>
                    <label style="padding-right: 30px; " for="delivery">Description :</label>
                    <textarea id="delivery" cols="30" rows="10" maxlength="400"></textarea>
                    <br>
                    <label style="padding-right: 30px;" for="input-name">Account Number :</label>
                    <input id="input-name" type="text">
                    <br>
                        <label for="Bank">Bank :</label>
                        <select name="" id="Bank">
                            <option value="BCA">BCA</option>
                            <option value="BNI">BNI</option>
                            <option value="MANDIRI">MANDIRI</option>
                            <option value="BSI">BSI</option>
                        </select>
                    <br>
                    <label style="padding-right: 30px;" for="input-name">Account Holder :</label>
                    <input id="input-name" type="text">
                    <br>
                    <label style="padding-right: 30px;" for="input-name">Transaction :</label>
                    <input style="width: 30px;" id="input-name" type="number">
                    <br>
                    <b>* if the transaction is for 3 person, choose 3 form the drop-down list</b>
                    <br>
                    <input id="sss" type="checkbox">
                    <label style="color: green;" for="sss">Send to Mobile Phone</label>
                    <br>
                    <input id="aaa" type="checkbox">
                    <label style="color: green;" for="aaa">Send to Email</label>
                    <br>
                    <label style="padding-right: 30px;" for="input-name">Send to Mobile Phone :</label>
                    <input id="input-name" type="text">
                    <br>
                    <label style="padding-right: 30px;" for="input-name">Send to Email :</label>
                    <input id="input-name" type="text">
                    <br>

                </td>
            </tr>
            <tr>
                <td><input type="submit" value="Upload foto"></td>
            </tr>
        </tbody>
    </table>
